<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Slideshow Automation</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .slide-card { transition: border-color 0.15s, background 0.15s; }
  .slide-card.selected { border-color: #2563eb; background: #eff6ff; }
  .sortable-ghost { opacity: 0.35; background: #dbeafe !important; }
  .sortable-chosen { cursor: grabbing !important; }
  .sortable-drag { box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18); transform: rotate(-1.5deg); }
  input[type="range"] { accent-color: #2563eb; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .speed-btn.active, .ratio-btn.active { background: #0f172a; color: white; }
  .slide-card .fit-section { display: none; }
  .slide-card.selected .fit-section { display: flex; }
  /* Index vs checkbox: index by default; checkbox on hover or while a
     selection is active (body.selection-mode). */
  .slide-card .card-check { display: none; accent-color: #2563eb; }
  .slide-card:hover .index-num,
  body.selection-mode .slide-card .index-num { display: none; }
  .slide-card:hover .card-check,
  body.selection-mode .slide-card .card-check { display: inline-block; }
  .slide-card.checked { background: #f0f9ff; border-color: #93c5fd; }
  #previewBox { transition: width 0.25s ease, height 0.25s ease; }
  /* Preview image: crop fills, letterbox contains */
  #previewImg.fit-crop {
    width: 100%; height: 100%; max-width: none; max-height: none;
    object-fit: cover;
    cursor: move;
    user-select: none;
    -webkit-user-drag: none;
  }
  #previewImg.fit-letterbox {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
  }
  #previewImg.dragging { cursor: grabbing; }
  /* Blurred background — only visible in letterbox mode while previewing an image */
  #previewBg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: blur(40px) brightness(0.85) saturate(0.6);
    transform: scale(1.1); /* hide blur edge artifacts */
    z-index: 0;
  }
  #previewBox > :not(#previewBg) { position: relative; z-index: 1; }
  .video-thumb.playing { border-color: #2563eb; }
  .video-thumb.playing .playing-indicator { display: inline-flex; }
  .rename-input {
    width: 100%;
    border: 1px solid #2563eb;
    border-radius: 3px;
    padding: 1px 4px;
    font-size: 11px;
    outline: none;
    text-align: center;
    background: white;
  }
</style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden">

<div class="flex h-full">

  <!-- Sidebar -->
  <aside class="w-[360px] bg-white border-r border-slate-200 flex flex-col">
    <div class="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
      <div>
        <h1 class="text-base font-semibold text-slate-800">Assets</h1>
        <div class="text-xs text-slate-500 mt-0.5"><span id="slideCount">0</span> / <span id="maxCount">30</span> images</div>
      </div>
      <label id="uploadLabel" class="inline-flex items-center gap-1.5 text-sm bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-md cursor-pointer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Upload
        <input id="uploadInput" type="file" accept="image/*" multiple class="hidden">
      </label>
    </div>

    <div id="selectionBar" class="hidden px-5 py-2 border-b border-slate-200 bg-slate-50 flex items-center justify-between text-xs">
      <label class="flex items-center gap-2 cursor-pointer text-slate-700 select-none">
        <input type="checkbox" id="selectAllCheck" class="w-3.5 h-3.5 cursor-pointer" />
        <span><span id="selectionCount" class="font-medium">0</span> selected</span>
      </label>
      <button id="deleteSelectedBtn" class="text-red-600 hover:text-red-700 hover:bg-red-50 font-medium px-2 py-1 rounded">
        Delete
      </button>
    </div>

    <div id="slideList" class="flex-1 overflow-y-auto scrollbar-thin p-3 space-y-1.5"></div>

    <div class="px-5 py-4 border-t border-slate-200 bg-slate-200 space-y-3">
      <div>
        <div class="text-xs text-slate-600 mb-1">Output ratio</div>
        <div id="ratioToggle" class="grid grid-cols-5 gap-1 bg-white border border-slate-300 rounded-md p-0.5">
          <button data-value="1:1" class="ratio-btn text-[11px] py-1 rounded">1:1</button>
          <button data-value="16:9" class="ratio-btn text-[11px] py-1 rounded active">16:9</button>
          <button data-value="9:16" class="ratio-btn text-[11px] py-1 rounded">9:16</button>
          <button data-value="4:3" class="ratio-btn text-[11px] py-1 rounded">4:3</button>
          <button data-value="3:4" class="ratio-btn text-[11px] py-1 rounded">3:4</button>
        </div>
      </div>

      <div>
        <div class="flex justify-between text-xs text-slate-600 mb-1">
          <span>Duration per slide</span>
          <span id="durationLabel" class="tabular-nums font-medium text-slate-800">4.0s</span>
        </div>
        <input id="durationRange" type="range" min="1" max="10" step="0.5" value="4" class="w-full" />
      </div>

      <div>
        <div class="text-xs text-slate-600 mb-1">Camera speed</div>
        <div id="speedToggle" class="grid grid-cols-3 gap-1 bg-white border border-slate-300 rounded-md p-0.5">
          <button data-value="slow" class="speed-btn text-xs py-1 rounded">Slow</button>
          <button data-value="medium" class="speed-btn text-xs py-1 rounded active">Medium</button>
          <button data-value="fast" class="speed-btn text-xs py-1 rounded">Fast</button>
        </div>
      </div>

      <div class="text-xs text-slate-500">
        Est. total: <span id="totalDuration" class="font-medium text-slate-700">0</span>s
      </div>

      <button id="generateBtn" class="w-full bg-slate-900 hover:bg-slate-800 disabled:bg-slate-400 disabled:cursor-not-allowed text-white font-medium py-2.5 rounded-md text-sm">
        Generate Slideshow
      </button>
    </div>
  </aside>

  <!-- Preview -->
  <main class="flex-1 flex flex-col bg-slate-800 overflow-hidden">
    <div class="flex-1 px-6 pt-6 pb-3 flex items-center justify-center overflow-hidden">
      <div id="previewBox" class="bg-black rounded-lg shadow-lg flex items-center justify-center overflow-hidden relative">
        <img id="previewBg" class="hidden" alt="" />
        <div id="previewPlaceholder" class="text-slate-400 text-sm">Generate a slideshow to begin</div>
        <img id="previewImg" class="hidden fit-crop" />
        <video id="previewVideo" class="hidden max-w-full max-h-full" controls></video>

        <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/70 flex flex-col items-center justify-center text-white gap-3">
          <svg class="animate-spin h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <circle cx="12" cy="12" r="9" opacity="0.3"/>
            <path d="M21 12a9 9 0 0 0-9-9"/>
          </svg>
          <div class="text-sm">Rendering slideshow…</div>
          <div class="text-xs text-white/60">~5s per slide</div>
        </div>
      </div>
    </div>

    <!-- Video gallery -->
    <div id="videoGalleryWrap" class="hidden px-6 pb-6 overflow-x-auto scrollbar-thin">
      <div id="videoGallery" class="flex gap-3 justify-center min-w-min"></div>
    </div>
  </main>
</div>

<!-- Slide card -->
<template id="slideTemplate">
  <div class="slide-card group relative bg-white border border-slate-200 rounded-lg p-2 cursor-grab hover:border-slate-300" data-fit-mode="crop" data-offset-x="0.5" data-offset-y="0.5">
    <div class="flex items-center gap-3">
      <div class="w-5 flex items-center justify-center flex-shrink-0">
        <span class="index-num text-[11px] text-slate-400 tabular-nums select-none">1</span>
        <input type="checkbox" class="card-check w-3.5 h-3.5 cursor-pointer" />
      </div>
      <img class="thumb w-14 h-14 rounded object-cover bg-slate-100 flex-shrink-0 pointer-events-none" />
      <div class="filename flex-1 min-w-0 text-xs font-medium text-slate-700 truncate"></div>
      <div class="flex gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
        <label class="p-1.5 rounded hover:bg-slate-100 text-slate-500 cursor-pointer" title="Replace">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"/></svg>
          <input type="file" accept="image/*" class="hidden replace-input">
        </label>
        <button class="delete-btn p-1.5 rounded hover:bg-red-50 text-slate-500 hover:text-red-600" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
      </div>
    </div>
    <div class="fit-section mt-2 pt-2 border-t border-slate-100 items-center justify-between gap-2">
      <span class="text-[10px] uppercase tracking-wide text-slate-400 font-medium">Fit mode</span>
      <button class="fit-toggle text-[11px] px-2.5 py-1 rounded-md border border-slate-300 bg-white hover:bg-slate-50 text-slate-700 font-medium inline-flex items-center gap-1.5" title="Click to switch crop / letterbox">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17l-4-4 4-4M17 7l4 4-4 4"/></svg>
        <span class="fit-value">Crop</span>
      </button>
    </div>
  </div>
</template>

<!-- Video thumb -->
<template id="thumbTemplate">
  <div class="video-thumb group relative w-36 flex-shrink-0 rounded-lg overflow-hidden border-2 border-transparent cursor-pointer hover:border-slate-300 bg-white shadow-sm" data-video="">
    <div class="relative">
      <img class="thumb-img w-full aspect-video object-cover bg-slate-200" />
      <button class="thumb-delete absolute top-1 left-1 w-6 h-6 rounded-full bg-black/60 hover:bg-red-600 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center" title="Delete">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <a class="thumb-download absolute top-1 right-1 w-6 h-6 rounded-full bg-black/60 hover:bg-emerald-600 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center" title="Download" download>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v12m-5-5l5 5 5-5M5 21h14"/></svg>
      </a>
      <span class="playing-indicator absolute bottom-1 left-1 px-1.5 py-0.5 rounded bg-blue-600 text-white text-[9px] font-medium hidden">PLAYING</span>
    </div>
    <div class="thumb-name text-[11px] px-2 py-1.5 text-slate-700 truncate text-center select-none" title=""></div>
  </div>
</template>

<script>
const $ = id => document.getElementById(id);
const slideList = $('slideList');
const slideTemplate = $('slideTemplate');
const previewImg = $('previewImg');
const previewVideo = $('previewVideo');
const previewPlaceholder = $('previewPlaceholder');
const loadingOverlay = $('loadingOverlay');
const generateBtn = $('generateBtn');
const uploadInput = $('uploadInput');
const uploadLabel = $('uploadLabel');
const slideCount = $('slideCount');
const maxCount = $('maxCount');
const totalDuration = $('totalDuration');
const durationRange = $('durationRange');
const durationLabel = $('durationLabel');
const speedToggle = $('speedToggle');
const ratioToggle = $('ratioToggle');
const previewBox = $('previewBox');
const previewBg = $('previewBg');
const videoGallery = $('videoGallery');
const videoGalleryWrap = $('videoGalleryWrap');
const thumbTemplate = $('thumbTemplate');
const selectionBar = $('selectionBar');
const selectAllCheck = $('selectAllCheck');
const selectionCount = $('selectionCount');
const deleteSelectedBtn = $('deleteSelectedBtn');

let imgLimit = 30;
let speed = 'medium';
let selectedRatio = '16:9';
let previewAspect = '16:9';
let currentVideo = null;
let currentImageFilename = null;
let pendingGenId = null;

durationRange.addEventListener('input', () => {
  durationLabel.textContent = `${parseFloat(durationRange.value).toFixed(1)}s`;
  updateStats();
});

speedToggle.addEventListener('click', e => {
  const btn = e.target.closest('.speed-btn');
  if (!btn) return;
  speed = btn.dataset.value;
  speedToggle.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b === btn));
});

ratioToggle.addEventListener('click', e => {
  const btn = e.target.closest('.ratio-btn');
  if (!btn) return;
  selectedRatio = btn.dataset.value;
  ratioToggle.querySelectorAll('.ratio-btn').forEach(b => b.classList.toggle('active', b === btn));
  // Only re-fit the preview if a video isn't dictating the aspect.
  if (previewVideo.classList.contains('hidden')) {
    previewAspect = selectedRatio;
    fitPreview();
  }
});

function getCurrentCard() {
  if (!currentImageFilename) return null;
  return [...slideList.querySelectorAll('.slide-card')]
    .find(c => c.dataset.filename === currentImageFilename) || null;
}

function getCardFitMode(filename) {
  if (!filename) return 'crop';
  const card = [...slideList.querySelectorAll('.slide-card')]
    .find(c => c.dataset.filename === filename);
  return card?.dataset.fitMode || 'crop';
}

function applyFitToPreview() {
  // Only meaningful when an image is being previewed (not video, not placeholder).
  const imageVisible = !previewImg.classList.contains('hidden');
  const fitMode = getCardFitMode(currentImageFilename);
  previewImg.classList.toggle('fit-crop', fitMode === 'crop');
  previewImg.classList.toggle('fit-letterbox', fitMode === 'letterbox');

  // Apply this slide's crop offsets to object-position (ignored visually in
  // letterbox mode, but kept so toggling back to crop restores the position).
  const card = getCurrentCard();
  const ox = parseFloat(card?.dataset.offsetX ?? 0.5);
  const oy = parseFloat(card?.dataset.offsetY ?? 0.5);
  previewImg.style.objectPosition = `${ox * 100}% ${oy * 100}%`;

  if (imageVisible && fitMode === 'letterbox' && currentImageFilename) {
    previewBg.src = `/api/images/${encodeURIComponent(currentImageFilename)}`;
    previewBg.classList.remove('hidden');
  } else {
    previewBg.classList.add('hidden');
    previewBg.removeAttribute('src');
  }
}

// Drag-to-reposition the crop window when previewing an image in crop mode.
(function setupCropDrag() {
  let drag = null;

  function computeOverflow() {
    const r = previewBox.getBoundingClientRect();
    const bw = r.width, bh = r.height;
    const iw = previewImg.naturalWidth, ih = previewImg.naturalHeight;
    if (!iw || !ih) return { ox: 0, oy: 0 };
    const scale = Math.max(bw / iw, bh / ih);
    return { ox: Math.max(0, iw * scale - bw), oy: Math.max(0, ih * scale - bh) };
  }

  previewImg.addEventListener('mousedown', e => {
    if (!previewImg.classList.contains('fit-crop')) return;
    const card = getCurrentCard();
    if (!card) return;
    const { ox, oy } = computeOverflow();
    if (ox === 0 && oy === 0) return; // image already fits exactly, nothing to drag
    drag = {
      card,
      startX: e.clientX,
      startY: e.clientY,
      startOX: parseFloat(card.dataset.offsetX ?? 0.5),
      startOY: parseFloat(card.dataset.offsetY ?? 0.5),
      overflowX: ox,
      overflowY: oy,
    };
    previewImg.classList.add('dragging');
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;
    let nx = drag.startOX, ny = drag.startOY;
    // Drag image LEFT (dx < 0) shifts visible window RIGHT, so offset_x increases.
    // Use negative sign so the image visually follows the cursor.
    if (drag.overflowX > 0) nx = Math.max(0, Math.min(1, drag.startOX - dx / drag.overflowX));
    if (drag.overflowY > 0) ny = Math.max(0, Math.min(1, drag.startOY - dy / drag.overflowY));
    drag.card.dataset.offsetX = nx.toFixed(4);
    drag.card.dataset.offsetY = ny.toFixed(4);
    previewImg.style.objectPosition = `${nx * 100}% ${ny * 100}%`;
  });

  document.addEventListener('mouseup', () => {
    if (!drag) return;
    drag = null;
    previewImg.classList.remove('dragging');
  });

  previewImg.addEventListener('dragstart', e => e.preventDefault()); // disable native image drag
})();

// ---------------- Dynamic preview sizing ----------------

function fitPreview() {
  const parent = previewBox.parentElement;
  const rect = parent.getBoundingClientRect();
  const cs = getComputedStyle(parent);
  const innerW = rect.width - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const innerH = rect.height - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
  if (innerW <= 0 || innerH <= 0) return;

  const [rw, rh] = previewAspect.split(':').map(Number);
  if (!rw || !rh) return;
  const ratio = rw / rh;

  let bw = innerW, bh = innerW / ratio;
  if (bh > innerH) { bh = innerH; bw = innerH * ratio; }
  previewBox.style.width = `${bw}px`;
  previewBox.style.height = `${bh}px`;
}

new ResizeObserver(fitPreview).observe(document.body);

previewVideo.addEventListener('loadedmetadata', () => {
  if (previewVideo.videoWidth && previewVideo.videoHeight) {
    previewAspect = `${previewVideo.videoWidth}:${previewVideo.videoHeight}`;
    fitPreview();
  }
});

// ---------------- Images ----------------

async function refreshImages() {
  const res = await fetch('/api/images');
  const data = await res.json();
  imgLimit = data.max;
  maxCount.textContent = imgLimit;

  const existing = new Map();
  slideList.querySelectorAll('.slide-card').forEach(c => existing.set(c.dataset.filename, c));

  slideList.innerHTML = '';
  data.images.forEach((name, idx) => {
    const card = existing.get(name) || makeSlideCard(name);
    card.querySelector('.index-num').textContent = idx + 1;
    slideList.appendChild(card);
  });
  updateStats();
  updateUploadAvail();
  updateSelectionUI();
}

function makeSlideCard(filename) {
  const node = slideTemplate.content.firstElementChild.cloneNode(true);
  node.dataset.filename = filename;
  const thumb = node.querySelector('.thumb');
  thumb.src = `/api/images/${encodeURIComponent(filename)}?t=${Date.now()}`;
  const nameEl = node.querySelector('.filename');
  nameEl.textContent = filename;
  nameEl.title = filename;

  node.addEventListener('click', e => {
    if (e.target.closest('button') || e.target.closest('label') || e.target.closest('input')) return;
    selectCard(node);
    showImage(filename);
  });

  const checkInput = node.querySelector('.card-check');
  checkInput.addEventListener('click', e => e.stopPropagation());
  checkInput.addEventListener('change', () => {
    node.classList.toggle('checked', checkInput.checked);
    updateSelectionUI();
  });

  node.querySelector('.delete-btn').addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm(`Delete ${filename}?`)) return;
    await fetch(`/api/images/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    refreshImages();
  });

  const fitBtn = node.querySelector('.fit-toggle');
  const fitValueEl = node.querySelector('.fit-value');
  fitBtn.addEventListener('click', e => {
    e.stopPropagation();
    const cur = node.dataset.fitMode || 'crop';
    const next = cur === 'crop' ? 'letterbox' : 'crop';
    node.dataset.fitMode = next;
    fitValueEl.textContent = next === 'crop' ? 'Crop' : 'Letterbox';
    if (currentImageFilename === node.dataset.filename) applyFitToPreview();
  });

  const replaceInput = node.querySelector('.replace-input');
  replaceInput.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch(`/api/images/${encodeURIComponent(filename)}`, { method: 'PUT', body: fd });
    if (res.ok) refreshImages();
    else alert('Replace failed: ' + (await res.text()));
    e.target.value = '';
  });

  return node;
}

// Animated reorder via SortableJS
Sortable.create(slideList, {
  animation: 180,
  easing: 'cubic-bezier(0.22, 0.61, 0.36, 1)',
  ghostClass: 'sortable-ghost',
  chosenClass: 'sortable-chosen',
  dragClass: 'sortable-drag',
  filter: 'button, label, input',
  preventOnFilter: false,
  onEnd: renumberSlides,
});

function selectCard(node) {
  slideList.querySelectorAll('.slide-card').forEach(c => c.classList.remove('selected'));
  node.classList.add('selected');
}

function renumberSlides() {
  [...slideList.querySelectorAll('.slide-card')].forEach((c, i) => {
    c.querySelector('.index-num').textContent = i + 1;
  });
}

function showImage(filename) {
  previewVideo.pause();
  previewVideo.classList.add('hidden');
  previewPlaceholder.classList.add('hidden');
  loadingOverlay.classList.add('hidden');
  previewImg.src = `/api/images/${encodeURIComponent(filename)}?t=${Date.now()}`;
  previewImg.classList.remove('hidden');
  currentImageFilename = filename;
  previewAspect = selectedRatio;
  fitPreview();
  applyFitToPreview();
}

function updateStats() {
  const cards = [...slideList.querySelectorAll('.slide-card')];
  slideCount.textContent = cards.length;
  totalDuration.textContent = (cards.length * parseFloat(durationRange.value)).toFixed(1);
  generateBtn.disabled = cards.length === 0;
}

function updateUploadAvail() {
  const count = slideList.querySelectorAll('.slide-card').length;
  const full = count >= imgLimit;
  uploadInput.disabled = full;
  uploadLabel.classList.toggle('opacity-50', full);
  uploadLabel.classList.toggle('cursor-not-allowed', full);
  uploadLabel.classList.toggle('cursor-pointer', !full);
  uploadLabel.title = full ? `Limit reached (${imgLimit})` : '';
}

function updateSelectionUI() {
  const cards = [...slideList.querySelectorAll('.slide-card')];
  const checked = cards.filter(c => c.querySelector('.card-check')?.checked);
  const n = checked.length;
  if (n > 0) {
    document.body.classList.add('selection-mode');
    selectionBar.classList.remove('hidden');
    selectionCount.textContent = n;
    selectAllCheck.checked = n === cards.length;
    selectAllCheck.indeterminate = n > 0 && n < cards.length;
  } else {
    document.body.classList.remove('selection-mode');
    selectionBar.classList.add('hidden');
    selectAllCheck.checked = false;
    selectAllCheck.indeterminate = false;
  }
}

selectAllCheck.addEventListener('change', () => {
  const cards = [...slideList.querySelectorAll('.slide-card')];
  cards.forEach(c => {
    const cb = c.querySelector('.card-check');
    if (cb) {
      cb.checked = selectAllCheck.checked;
      c.classList.toggle('checked', cb.checked);
    }
  });
  updateSelectionUI();
});

deleteSelectedBtn.addEventListener('click', async () => {
  const cards = [...slideList.querySelectorAll('.slide-card')];
  const filenames = cards
    .filter(c => c.querySelector('.card-check')?.checked)
    .map(c => c.dataset.filename);
  if (!filenames.length) return;
  const preview = filenames.slice(0, 5).join(', ') + (filenames.length > 5 ? `, … (+${filenames.length - 5} more)` : '');
  if (!confirm(`Delete ${filenames.length} image(s)?\n\n${preview}`)) return;
  const res = await fetch('/api/images/bulk-delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filenames }),
  });
  if (!res.ok) {
    alert('Bulk delete failed: ' + (await res.text()));
    return;
  }
  // If the previewed image was deleted, clear the preview.
  if (currentImageFilename && filenames.includes(currentImageFilename)) {
    currentImageFilename = null;
    previewImg.classList.add('hidden');
    if (!currentVideo) previewPlaceholder.classList.remove('hidden');
  }
  refreshImages();
});

uploadInput.addEventListener('change', async e => {
  const currentCount = slideList.querySelectorAll('.slide-card').length;
  const slotsLeft = imgLimit - currentCount;
  const files = [...e.target.files].slice(0, Math.max(0, slotsLeft));
  if (files.length < e.target.files.length) {
    alert(`Only uploaded ${files.length} (limit: ${imgLimit} total)`);
  }
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/images', { method: 'POST', body: fd });
    if (!res.ok) {
      alert(`Upload failed for ${file.name}: ${await res.text()}`);
      break;
    }
  }
  e.target.value = '';
  refreshImages();
});

// ---------------- Output videos / gallery ----------------

async function refreshOutputs(selectName) {
  const res = await fetch('/api/outputs');
  const data = await res.json();
  // Preserve any in-progress placeholder across refreshes (delete/rename/etc.).
  const pendingNode = videoGallery.querySelector('.video-thumb.pending');
  videoGallery.innerHTML = '';
  data.outputs.forEach(name => videoGallery.appendChild(makeThumb(name)));
  if (pendingNode) videoGallery.appendChild(pendingNode);
  videoGalleryWrap.classList.toggle('hidden', data.outputs.length === 0 && !pendingNode);

  if (selectName && data.outputs.includes(selectName)) {
    playVideo(selectName);
  } else if (currentVideo) {
    if (data.outputs.includes(currentVideo) || currentVideo === pendingGenId) {
      highlightThumb(currentVideo);
    } else {
      currentVideo = null;
    }
  }
}

function makeThumb(name) {
  const node = thumbTemplate.content.firstElementChild.cloneNode(true);
  node.dataset.video = name;

  const img = node.querySelector('.thumb-img');
  img.src = `/api/output/${encodeURIComponent(name)}/thumb?t=${Date.now()}`;
  img.alt = name;
  img.addEventListener('error', () => { img.src = ''; img.style.background = '#1e293b'; });

  const nameDiv = node.querySelector('.thumb-name');
  nameDiv.textContent = name;
  nameDiv.title = `${name} (double-click to rename)`;

  const dl = node.querySelector('.thumb-download');
  dl.href = `/api/output/${encodeURIComponent(name)}`;
  dl.setAttribute('download', name);
  dl.addEventListener('click', e => e.stopPropagation());

  node.querySelector('.thumb-delete').addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm(`Delete "${name}"?\n\nThis can't be undone.`)) return;
    const res = await fetch(`/api/output/${encodeURIComponent(name)}`, { method: 'DELETE' });
    if (!res.ok) {
      alert('Delete failed: ' + (await res.text()));
      return;
    }
    if (currentVideo === name) {
      currentVideo = null;
      previewVideo.pause();
      previewVideo.removeAttribute('src');
      previewVideo.load();
      previewVideo.classList.add('hidden');
      previewPlaceholder.classList.remove('hidden');
      previewAspect = selectedRatio;
      fitPreview();
    }
    refreshOutputs();
  });

  nameDiv.addEventListener('dblclick', e => {
    e.stopPropagation();
    startRename(node, nameDiv);
  });

  node.addEventListener('click', () => playVideo(node.dataset.video));

  return node;
}

function startRename(node, nameDiv) {
  const oldName = node.dataset.video;
  const oldStem = oldName.replace(/\.mp4$/i, '');
  const input = document.createElement('input');
  input.type = 'text';
  input.value = oldStem;
  input.className = 'rename-input';
  nameDiv.replaceWith(input);
  input.focus();
  input.select();

  let done = false;
  const finish = async commit => {
    if (done) return;
    done = true;
    const newStem = input.value.trim();
    if (!commit || !newStem || newStem === oldStem) {
      input.replaceWith(nameDiv);
      return;
    }
    const res = await fetch(`/api/output/${encodeURIComponent(oldName)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_name: newStem })
    });
    if (!res.ok) {
      alert('Rename failed: ' + (await res.text()));
      input.replaceWith(nameDiv);
      return;
    }
    const data = await res.json();
    if (currentVideo === oldName) currentVideo = data.filename;
    refreshOutputs(currentVideo === data.filename ? data.filename : undefined);
  };

  input.addEventListener('blur', () => finish(true));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
  });
}

function playVideo(name) {
  currentVideo = name;
  currentImageFilename = null;
  // Clear slide selection — the fit toggle should only show for the slide
  // whose image is actually in the preview.
  slideList.querySelectorAll('.slide-card.selected').forEach(c => c.classList.remove('selected'));
  const url = `/api/output/${encodeURIComponent(name)}`;
  previewImg.classList.add('hidden');
  previewPlaceholder.classList.add('hidden');
  previewBg.classList.add('hidden');
  previewBg.removeAttribute('src');
  loadingOverlay.classList.add('hidden');
  if (!previewVideo.src.endsWith(url)) previewVideo.src = url;
  previewVideo.classList.remove('hidden');
  previewVideo.play().catch(() => {});
  highlightThumb(name);
}

function highlightThumb(name) {
  videoGallery.querySelectorAll('.video-thumb').forEach(t => {
    t.classList.toggle('playing', t.dataset.video === name);
  });
  const active = videoGallery.querySelector('.video-thumb.playing');
  if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

// ---------------- Generate ----------------

function makePendingThumb(id) {
  const node = document.createElement('div');
  node.className = 'video-thumb pending group relative w-36 flex-shrink-0 rounded-lg overflow-hidden border-2 border-transparent cursor-pointer hover:border-slate-300 bg-white shadow-sm';
  node.dataset.video = id;
  node.dataset.pending = 'true';
  node.innerHTML = `
    <div class="w-full aspect-video flex items-center justify-center bg-slate-100">
      <svg class="animate-spin h-5 w-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <circle cx="12" cy="12" r="9" opacity="0.3"/>
        <path d="M21 12a9 9 0 0 0-9-9"/>
      </svg>
    </div>
    <div class="text-[11px] px-2 py-1.5 bg-white text-slate-700 truncate text-center">Generating…</div>
  `;
  node.addEventListener('click', () => selectPending(id));
  return node;
}

function selectPending(id) {
  currentVideo = id;
  currentImageFilename = null;
  slideList.querySelectorAll('.slide-card.selected').forEach(c => c.classList.remove('selected'));
  previewImg.classList.add('hidden');
  previewVideo.pause();
  previewVideo.classList.add('hidden');
  previewPlaceholder.classList.add('hidden');
  previewBg.classList.add('hidden');
  previewBg.removeAttribute('src');
  loadingOverlay.classList.remove('hidden');
  highlightThumb(id);
}

generateBtn.addEventListener('click', async () => {
  const cards = [...slideList.querySelectorAll('.slide-card')];
  if (!cards.length) return;
  const slides = cards.map(c => ({
    filename: c.dataset.filename,
    fit_mode: c.dataset.fitMode || 'crop',
    offset_x: parseFloat(c.dataset.offsetX ?? 0.5),
    offset_y: parseFloat(c.dataset.offsetY ?? 0.5),
  }));

  generateBtn.disabled = true;

  // Drop a placeholder thumb on the right of the gallery immediately. The user
  // can keep clicking around other videos; the loading state only shows when
  // the placeholder itself is the selected item.
  const id = `pending_${Date.now()}`;
  pendingGenId = id;
  const pendingThumb = makePendingThumb(id);
  videoGallery.appendChild(pendingThumb);
  videoGalleryWrap.classList.remove('hidden');
  selectPending(id);

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        slides,
        duration: parseFloat(durationRange.value),
        speed,
        ratio: selectedRatio,
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const wasViewingPending = currentVideo === id;
    pendingGenId = null;
    pendingThumb.remove();
    // If the user is still parked on the placeholder, auto-play the new video.
    // Otherwise keep them on whatever they were watching.
    await refreshOutputs(wasViewingPending ? data.video : undefined);
  } catch (err) {
    const wasViewingPending = currentVideo === id;
    pendingGenId = null;
    pendingThumb.remove();
    if (wasViewingPending) {
      currentVideo = null;
      loadingOverlay.classList.add('hidden');
      previewPlaceholder.classList.remove('hidden');
    }
    alert('Generate failed: ' + err.message);
  } finally {
    generateBtn.disabled = false;
  }
});

refreshImages();
refreshOutputs();
fitPreview();
</script>
